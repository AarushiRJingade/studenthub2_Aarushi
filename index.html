<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentHub Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        accent: { 400: '#f87171', 500: '#ef4444', 600: '#dc2626', 900: '#7f1d1d' },
                        dark: { bg: '#09090b', card: '#18181b', border: '#27272a' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-zinc-300 font-sans min-h-screen selection:bg-accent-500 selection:text-white">

    <canvas id="bg-canvas"></canvas>

    <div class="max-w-6xl mx-auto relative z-10 p-4 md:p-12">
        
        <header class="mb-12 flex flex-col md:flex-row md:items-end justify-between border-b border-dark-border pb-6 slide-in" style="animation-delay: 0.1s;">
            <div>
                <div class="flex items-center gap-3 mb-2 text-accent-500">
                    <svg class="w-10 h-10 drop-shadow-[0_0_10px_rgba(239,68,68,0.5)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5"></path></svg>
                    <h1 class="text-4xl font-bold tracking-tight text-white">StudentHub</h1>
                </div>
                <p class="text-zinc-500 font-medium">Week 2 Dashboard — Interactive Workspace</p>
            </div>
            <div class="mt-4 md:mt-0 text-sm font-semibold text-accent-400 bg-accent-900/30 px-4 py-2 rounded-full border border-accent-900 shadow-[0_0_15px_rgba(239,68,68,0.1)]">
                System: Online
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-dark-card/70 backdrop-blur-md p-8 rounded-2xl border border-dark-border shadow-2xl slide-in" style="animation-delay: 0.2s;">
                <div class="flex items-center gap-3 mb-6 border-b border-dark-border pb-4">
                    <div class="bg-accent-900/40 p-2 rounded-lg text-accent-500 border border-accent-900/50">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                    </div>
                    <h2 class="text-2xl font-bold text-white">Action Items</h2>
                </div>
                
                <div class="flex gap-2 mb-6 group">
                    <input type="text" id="taskInput" class="bg-dark-bg/80 border border-dark-border rounded-xl px-4 py-3 flex-grow text-white focus:outline-none focus:border-accent-500 transition-all placeholder-zinc-600 shadow-inner" placeholder="Initialize new task...">
                    <button onclick="addTask()" class="bg-accent-600 text-white px-6 py-3 rounded-xl hover:bg-accent-500 transition-all font-semibold shadow-[0_0_15px_rgba(220,38,38,0.4)] hover:shadow-[0_0_25px_rgba(239,68,68,0.6)] active:scale-95">Add</button>
                </div>
                <ul id="taskList" class="space-y-3"></ul>
            </div>

            <div class="bg-dark-card/70 backdrop-blur-md p-8 rounded-2xl border border-dark-border shadow-2xl slide-in" style="animation-delay: 0.3s;">
                <div class="flex items-center gap-3 mb-6 border-b border-dark-border pb-4">
                    <div class="bg-accent-900/40 p-2 rounded-lg text-accent-500 border border-accent-900/50">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    </div>
                    <h2 class="text-2xl font-bold text-white">Deadlines</h2>
                </div>
                
                <div class="bg-dark-bg/80 rounded-xl p-5 border border-dark-border mb-6 focus-within:border-accent-500 focus-within:shadow-[0_0_15px_rgba(239,68,68,0.1)] transition-all">
                    <div class="flex flex-col gap-4">
                        <div class="flex gap-3">
                            <input type="text" id="courseInput" class="bg-dark-card border border-dark-border text-white rounded-lg px-3 py-2 w-1/3 focus:outline-none focus:border-accent-500 transition-colors placeholder-zinc-600 font-medium" placeholder="Course ID">
                            <input type="text" id="assignmentInput" class="bg-dark-card border border-dark-border text-white rounded-lg px-3 py-2 w-2/3 focus:outline-none focus:border-accent-500 transition-colors placeholder-zinc-600 font-medium" placeholder="Assignment Title">
                        </div>
                        <div class="flex gap-3 items-center">
                            <div class="relative flex-grow">
                                <input type="date" id="dateInput" class="w-full bg-dark-card border border-dark-border text-zinc-300 rounded-lg px-3 py-2 focus:outline-none focus:border-accent-500 cursor-pointer [color-scheme:dark]">
                            </div>
                            <button onclick="addAssignment()" class="bg-zinc-800 text-white border border-zinc-700 hover:border-accent-500 hover:text-accent-400 px-6 py-2 rounded-lg transition-all font-semibold active:scale-95">Save</button>
                        </div>
                    </div>
                </div>
                <ul id="assignmentList" class="space-y-3"></ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
